# filename: templates/typescript-basic-webserver/manifests/deployment.yaml
# Kubernetes deployment configuration for the web application
# Template variables:
# noveiry - Will be replaced with the GitHub username from the repository URL
# test-dev-container - Will be replaced with the actual repository name
#
# This file is automatically configured during project initialization

apiVersion: apps/v1
kind: Deployment
metadata:
  name: "test-dev-container-deployment"
  labels:
    app: "test-dev-container"
    owner: "noveiry"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "test-dev-container"
  template:
    metadata:
      labels:
        app: "test-dev-container"
    spec:
      containers:
        - name: "test-dev-container"
          image: ghcr.io/noveiry/test-dev-container:520516d-20260304120740
          ports:
            - containerPort: 3000
          # minimal resources as this is just a test            
          resources:
            limits:
              cpu: "100m"
              memory: "128Mi"
            requests:
              cpu: "50m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: "test-dev-container-service"
spec:
  selector:
    app: "test-dev-container"
  ports:
    - port: 80
      targetPort: 3000